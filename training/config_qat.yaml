# QAT (Quantization-Aware Training) Configuration
#
# 사용법:
#   cd training
#   uv run python run_qat.py --config config_qat.yaml

# Experiment
exp_name: "qat_yolov8s"
wandb_project: ""  # 비워두면 WandB 비활성화
seed: 42

# Dynamic Module Selection
dataset_module: "dataset"
model_module: "yolov8s_qat"  # QAT 전용 모델 모듈

# Device Settings
device: '0'
workers: 8

# Data Config
data_path: "./PCB_DATASET"
names: ['missing_hole', 'mouse_bite', 'open_circuit', 'short', 'spur', 'spurious_copper']

# Split Strategy (기존 학습과 동일)
test_size: 0.1
val_size: 0.2

# QAT 전용 설정
qat:
  # Pre-trained 모델 경로 (일반 학습으로 생성된 best.pt)
  pretrained_path: "./runs/baseline_v8s/weights/best.pt"

  # Calibration 설정
  calibration:
    num_batches: 100        # Calibration에 사용할 배치 수
    method: "histogram"     # 'histogram' 또는 'max'

  # 양자화 설정
  quantization:
    num_bits: 8             # INT8
    quant_conv: true        # Conv2d 레이어 양자화
    quant_linear: true      # Linear 레이어 양자화
    weight_per_channel: true  # 채널별 weight 양자화 (정확도 향상)
    skip_last_layers: true  # Detect Head 마지막 레이어 양자화 제외 (정확도 민감)

  # Fine-tuning 설정
  finetune:
    epochs: 30              # QAT fine-tuning 에폭
    lr0: 0.0001             # 낮은 학습률 (pre-trained이므로)
    lrf: 0.1                # 최종 LR = lr0 * lrf

  # ONNX Export 설정
  export:
    opset: 17               # ONNX opset 버전
    simplify: true          # onnxsim으로 최적화
    dynamic_batch: false    # 동적 배치 크기 (TensorRT용은 false 권장)

# Training Control (Fine-tuning)
epochs: 30                  # qat.finetune.epochs와 동일
batch_size: 8               # 메모리 문제로 감소 (16 -> 8)
img_size: 640
patience: 15                # Early stopping patience (QAT는 빠르게 수렴)
save: true
save_period: -1

# Optimizer
optimizer: 'AdamW'
lr0: 0.0001                 # qat.finetune.lr0과 동일
momentum: 0.937
weight_decay: 0.0005

# Scheduler
scheduler_type: 'cosine'
lrf: 0.1

# Loss Gains (기존과 동일)
box: 7.5
cls: 0.5
dfl: 1.5

# Augmentation (QAT fine-tuning에서는 약하게 설정)
hsv_h: 0.015
hsv_s: 0.4                  # 감소
hsv_v: 0.3                  # 감소
degrees: 0.0
translate: 0.1
scale: 0.3                  # 감소
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 0.5                 # 감소
mixup: 0.0
copy_paste: 0.0
