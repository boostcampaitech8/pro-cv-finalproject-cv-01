# QAT (Quantization-Aware Training) Configuration
#
# 사용법:
#   cd training
#   uv run python run_qat.py --config config_qat.yaml

# Experiment
exp_name: "qat_yolov8s"
wandb_project: ""  # 비워두면 WandB 비활성화
seed: 42

# Dynamic Module Selection
dataset_module: "dataset"
model_module: "yolov8s_qat"  # QAT 전용 모델 모듈

# Device Settings
device: '0'
workers: 8

# Data Config
data_path: "./PCB_DATASET"
names: ['missing_hole', 'mouse_bite', 'open_circuit', 'short', 'spur', 'spurious_copper']

# Split Strategy (기존 학습과 동일)
test_size: 0.1
val_size: 0.2

# QAT 전용 설정
qat:
  # Pre-trained 모델 경로
  # Scratch QAT: COCO pretrained 모델로 처음부터 양자화 학습
  pretrained_path: "yolov8s.pt"  # COCO pretrained (자동 다운로드)

  # Calibration 설정
  calibration:
    num_batches: 65         # 전체 train 데이터 사용 (483장 / 8 = ~61 배치)
    method: "histogram"     # 'histogram' 또는 'max'

  # 양자화 설정
  quantization:
    num_bits: 8             # INT8
    quant_conv: true        # Conv2d 레이어 양자화
    quant_linear: true      # Linear 레이어 양자화
    weight_per_channel: true  # 채널별 weight 양자화 (정확도 향상)
    skip_last_layers: true  # Detect Head 마지막 레이어 양자화 제외 (정확도 민감)

  # 학습 설정 (Scratch QAT)
  finetune:
    epochs: 200             # Scratch QAT: 처음부터 학습
    lr0: 0.001              # 일반 학습과 동일
    lrf: 0.01               # 최종 LR = lr0 * lrf

  # ONNX Export 설정
  export:
    opset: 17               # ONNX opset 버전
    simplify: true          # onnxsim으로 최적화
    dynamic_batch: false    # 동적 배치 크기 (TensorRT용은 false 권장)

# Training Control (Scratch QAT)
epochs: 200                 # Scratch QAT: 처음부터 학습
batch_size: 8               # 메모리 문제로 감소 (16 -> 8)
img_size: 640
patience: 30                # Early stopping patience
save: true
save_period: -1

# Optimizer (일반 학습과 동일)
optimizer: 'AdamW'
lr0: 0.001                  # 일반 학습과 동일
momentum: 0.937
weight_decay: 0.0005

# Scheduler
scheduler_type: 'cosine'
lrf: 0.01

# Loss Gains (기존과 동일)
box: 7.5
cls: 0.5
dfl: 1.5

# Augmentation (일반 학습과 동일)
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.0
copy_paste: 0.0
