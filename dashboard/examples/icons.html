  <script>
    $(document).ready(function () {
      // Dummy Data for Defect Logs (Mocking API Response)
      // Updated to support multiple defects per image
      const defectLogs = []; // Cleared for API usage

      const tableBody = $('#defect-log-table-body');
      const mainImage = $('#main-image');
      const detailsTitle = $('#image-details-title');
      const detailsDesc = $('#image-details-desc');

      // Color mapping for defect types
      const colorMap = {
        'Missing Hole': 'red',
        'Mouse Bite': 'orange',
        'Open Circuit': 'blue',
        'Short': 'purple',
        'Spur': 'green',
        'Spurious Copper': 'brown'
      };

      // Populate Table Function
      function renderTable() {
        tableBody.empty();
        defectLogs.forEach(log => {
          let types = log.defects.map(d => d.type).join(', ');
          let typeClass = 'text-danger';

          if (log.defects.length === 0) {
            types = "Normal";
            typeClass = "text-success";
          }

          const row = `
              <tr class="defect-row" style="cursor: pointer;" data-id="${log.uid}">
                <td>${log.time}</td>
                <td class="${typeClass}">${types}</td>
                <td class="text-primary">${log.id}</td>
              </tr>
            `;
          tableBody.append(row);
        });
      }

      // Initial Render
      renderTable();

      // Simulation / API Polling Logic
      // Updated to AWS Server
      const API_BASE_URL = "http://3.36.185.146:8000";

      // Start polling automatically
      fetchLogs();
      setInterval(fetchLogs, 2000);

      async function fetchLogs() {
        try {
          const response = await fetch(`${API_BASE_URL}/latest?limit=50`);
          if (!response.ok) throw new Error('API Network response was not ok');

          const data = await response.json();
          if (!data) return;

          // Map API data to Frontend format
          const mappedLogs = data.map(record => {
            // Format Time (ISO -> HH:MM:SS)
            const dateObj = new Date(record.timestamp);
            const timeStr = dateObj.toTimeString().split(' ')[0];

            // Construct Image URL
            let imageUrl = '../assets/img/logo-small.png';
            if (record.image_path) {
              imageUrl = `${API_BASE_URL}/${record.image_path.replace(/\\/g, '/')}`;
            }

            // Map Defects
            const defects = [];
            if (record.result === 'defect') {
              let bbox = [0, 0, 0, 0];
              if (record.bbox && record.bbox.length === 4) {
                const [x1, y1, x2, y2] = record.bbox;
                bbox = [x1, y1, x2 - x1, y2 - y1];
              }

              defects.push({
                type: record.defect_type || 'Unknown',
                bbox: bbox
              });
            }

            return {
              uid: record.id || `${record.timestamp}_${record.image_id}`, // Unique Key
              id: record.image_id, // Display ID
              time: timeStr,
              confidence: record.confidence,
              image: imageUrl,
              defects: defects
            };
          });

          if (mappedLogs.length > 0) {
            // Save currently selected ID (UID)
            const activeRow = $('.table-active');
            const currentSelectedUid = activeRow.length > 0 ? activeRow.data('id') : null;

            // Update global array
            defectLogs.length = 0;
            mappedLogs.forEach(l => defectLogs.push(l));

            renderTable();

            // Restore selection
            let restored = false;
            if (currentSelectedUid) {
              // Use quotes for selector in case of special chars
              const newRow = $(`.defect-row[data-id='${currentSelectedUid}']`);
              if (newRow.length > 0) {
                newRow.addClass('table-active');
                restored = true;
              }
            }

            // If nothing restored (was null or ID gone), select first
            if (!restored && $('.table-active').length === 0) {
              $('.defect-row').first().click();
            }
          }

        } catch (error) {
          console.error("Failed to fetch logs:", error);
        }
      }

      function generateRandomLog() {
        // Deprecated, kept empty or removed.
      }

      // Click Event Handler
      $(document).on('click', '.defect-row', function () {
        // Highlight selected row
        $('.defect-row').removeClass('table-active'); // Remove formatting from others
        $(this).addClass('table-active'); // Bootstrap class for highlighting

        const uid = $(this).data('id');
        const selectedLog = defectLogs.find(log => log.uid == uid); // Loose equality for string/number match

        if (selectedLog) {
          // Update Image
          mainImage.attr('src', selectedLog.image);

          // Update Details
          const types = selectedLog.defects.map(d => d.type).join(', ');
          detailsTitle.text(`${selectedLog.id} - ${types}`);
          detailsDesc.html(`
            <strong>Time:</strong> ${selectedLog.time}<br>
            <strong>Confidence:</strong> ${(selectedLog.confidence * 100).toFixed(1)}%<br>
            <strong>Defect Count:</strong> ${selectedLog.defects.length}
          `);

          // Update BBox
          updateBBox(selectedLog.defects);
        }
      });

      // BBox Update Function
      function updateBBox(defects) {
        const container = $('#bbox-container');
        container.empty(); // Clear existing bboxes

        const img = document.getElementById('main-image');
        if (!img) return;

        // Calculate image offset within the container (because of Flex centering)
        const currentWidth = img.width;
        const currentHeight = img.height;
        const offsetLeft = img.offsetLeft;
        const offsetTop = img.offsetTop;

        // Scaling factor (assuming dummy bbox is based on original image size or fixed 300x300 canvas)
        // For this demo, let's assume the dummy BBox is relative to a 250x250 coordinate space 
        // and mapped roughly to the current image size if meaningful, OR just applied as raw pixels + offset.
        // User said "weird places", likely due to offset. Let's fix offset first.
        // We will map the random BBox (0-250) to the current image size for better resizing support.
        const refWidth = 250; // Reference width of dummy generation
        const refHeight = 250;

        const scaleX = currentWidth / refWidth;
        const scaleY = currentHeight / refHeight;

        if ($('#bboxToggle').is(':checked') && defects && defects.length > 0) {
          defects.forEach(defect => {
            const bbox = defect.bbox; // [x, y, w, h] from dummy (approx 0-250 range)
            const color = colorMap[defect.type] || 'red';

            // Apply scaling and offset
            // If the user wants raw pixels, we skip scaling. But flexible is better.
            // Let's rely on the offset fix primarily, and assume the random data is "screen pixels" relative to image top-left.
            // To make it look "inside" the image regardless of size, let's scale it relative to the image size.

            // For now, let's stick to simple offset + raw dummy values to check if visual location works.
            // The main issue is likely the 'offsetLeft' missing.

            const finalX = offsetLeft + bbox[0];
            const finalY = offsetTop + bbox[1];
            const finalW = bbox[2];
            const finalH = bbox[3];

            const boxDiv = $('<div></div>').css({
              'position': 'absolute',
              'left': finalX + 'px',
              'top': finalY + 'px',
              'width': finalW + 'px',
              'height': finalH + 'px',
              'border': `2px solid ${color}`,
              'pointer-events': 'none'
            });

            const label = $('<span></span>').text(defect.type).css({
              'position': 'absolute',
              'top': '-20px',
              'left': '-2px',
              'background-color': color,
              'color': 'white',
              'font-size': '10px',
              'padding': '2px 4px',
              'white-space': 'nowrap',
              'z-index': 10
            });

            boxDiv.append(label);
            container.append(boxDiv);
          });
        }
      }

      // Toggle Event
      $('#bboxToggle').change(function () {
        const activeRow = $('.table-active');
        if (activeRow.length > 0) {
          const uid = activeRow.data('id');
          const selectedLog = defectLogs.find(log => log.uid == uid);
          if (selectedLog) updateBBox(selectedLog.defects);
        }
      });

      // Select first item by default
      $('.defect-row').first().click();
    });
  </script>
